version: '3.8'

services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.pipeline
    container_name: crypto_sentinel_pipeline
    env_file:
      - .env
    environment:
      # Mount the local models dir so the GGUF is accessible inside the container
      - LLM_MODEL_PATH=/app/models/mistral-7b-instruct-v0.1.Q3_K_M.gguf
      # Set LLM_N_GPU_LAYERS=-1 if the host has a CUDA GPU
      - LLM_N_GPU_LAYERS=${LLM_N_GPU_LAYERS:-0}
      - LLM_N_THREADS=${LLM_N_THREADS:-8}
    restart: unless-stopped
    volumes:
      - ./models:/app/models:ro          # GGUF files (read-only)
      - model_artifacts:/app/model_artifacts
      - ./data:/app/data                 # SQLite DB

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: crypto_sentinel_dashboard
    ports:
      - "8501:8501"
    depends_on:
      - pipeline
    env_file:
      - .env
    environment:
      - LLM_MODEL_PATH=/app/models/mistral-7b-instruct-v0.1.Q3_K_M.gguf
      - LLM_N_GPU_LAYERS=${LLM_N_GPU_LAYERS:-0}
      - LLM_N_THREADS=${LLM_N_THREADS:-8}
    volumes:
      - ./models:/app/models:ro
      - model_artifacts:/app/model_artifacts
      - ./data:/app/data                 # SQLite DB (shared with pipeline)

volumes:
  model_artifacts:
